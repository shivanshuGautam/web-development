<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Homepage</title>
    <link rel="stylesheet" href="./css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
  </head>

  <body>
    <header class="d-flex justify-content-between px-5 align-content-center">
      <!-- logocraving -->
      <div class="img">
        <a href="#"
          ><img src="./Images/logo-light.png" alt="" class="logo-img ms-5"
        /></a>
      </div>

      <!-- loginbuttion register -->
      <div class="nav_login d-flex gap-3 align-items-center">
        <a href="#" class="btn text-white">Login</a>
        <a href="#" class="btn text-white">Register</a>
      </div>
    </header>

    <!-- mainsection -->
    <main>
      <!-- SLIDE1 -->
      <div id="carouselExampleRide" class="carousel slide" data-bs-ride="true">
        <div class="carousel-inner">
          <div class="carousel-item active">
            <img src="./Images/slider-1.jpeg" class="d-block w-100" alt="..." />

            <!-- CONTENT -->
            <div>
              <div class="d-flex justify-content-center text-center">
                <h1>Your Favorite Food, <br />Delivered Fast</h1>
              </div>
              <div class="d-flex justify-content-center">
                <p>
                  Order from thousands of restaurants and get it delivered to
                  your doorstep
                </p>
              </div>
            </div>

            <!-- botton -->
            <div
              class="d-flex justify-content-center align-content-center gap-3"
            >
              <!-- sign up button -->
              <a href="#" class="btnsignup rounded-2">Sign up</a>
              <!-- order btn -->
              <a href="#" class="btnorder rounded-2">Order Now</a>
            </div>

            <!-- SearchBar -->
           <div class="d-flex justify-content-center align-content-center searchbar">
            <span class="icon "><i class="bi bi-search"></i></span>
            <input class="input " placeholder="restaurants or dishes..."">
           </div>
          </div>

          <!-- SLIDE2 -->
          <div class="carousel-item">
            <img src="./Images/slider-2.jpeg" class="d-block w-100" alt="..." />
          </div>
          <div class="carousel-item">
            <img src="./Images/slider-3.jpeg" class="d-block w-100" alt="..." />
          </div>
          <div class="carousel-item">
            <img src="./Images/slider-4.jpeg" class="d-block w-100" alt="..." />
          </div>
        </div>
        <button
          class="carousel-control-prev"
          type="button"
          data-bs-target="#carouselExampleRide"
          data-bs-slide="prev"
        >
          <span class="carousel-control-prev-icon" aria-hidden="true"></span>
          <span class="visually-hidden">Previous</span>
        </button>
        <button
          class="carousel-control-next"
          type="button"
          data-bs-target="#carouselExampleRide"
          data-bs-slide="next"
        >
          <span class="carousel-control-next-icon" aria-hidden="true"></span>
          <span class="visually-hidden">Next</span>
        </button>
      </div>
    </main>

    <!-- section1 -->
    <section></section>

    <!-- section2 -->
    <section></section>

    <!-- section3 -->
    <section></section>

    <!-- section4 -->
    <section></section>

    <!-- footerwork -->
    <footer></footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
