<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bootstrap | Day 2</title>
  <link rel="stylesheet" href="	https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
</head>

<body>
  <div class="container-fluid d-flex align-items-center vh-100 bg-primary justify-content-center">
    <div class="row gap-5 w-75 justify-content-center align-items-end text-secondary">
      <!-- Login -->
      <div class="col-4 bg-white text-black p-5 rounded-3 h-75 d-flex align-items-center me-5" n>
        <div class="w-100 d-flex flex-column gap-3">
          <h1><u class="link-underline-primary">Lo</u>gin</h1>

          <div class="border-bottom border-secondary p-2 d-flex gap-3">
            <i class="bi bi-envelope fs-5 text-black"></i>
            <input type="email" class="form-control border-0" placeholder="Enter your email" />
          </div>

          <div class="border-bottom border-secondary p-2 d-flex gap-2">
            <i class="bi bi-lock fs-5 "></i>
            <input type="password" class="form-control border-0" placeholder="Enter your password" />
            <i class="bi bi-eye d-flex align-items-center fs-5"></i>
          </div>

          <div class="d-flex justify-content-between">
            <div>
              <input type="checkbox" />
              <span>Remember me</span>
            </div>
            <a href="#" class="text-decoration-none">Forgot password</a>
          </div>

          <button class="btn btn-primary">Login Now</button>
          <div class="d-flex justify-content-center gap-2">
            <span>Don't have an account?</span>
            <a href="#" class="text-decoration-none">Signup now</a>
          </div>
        </div>
      </div>

      <!-- Register -->

      <div class="col-4 h-100 bg-white rounded-3 text-black p-5">
        <div class="w-100 d-flex flex-column gap-3">
          <h1><u class="link-underline-primary">Re</u>gister</h1>

          <div class="border-bottom border-secondary p-2 d-flex gap-3">
            <i class="bi bi-envelope fs-5"></i>
            <input type="text" class="form-control border-0" placeholder="Enter your name" />
          </div>

          <div class="border-bottom border-secondary p-2 d-flex gap-3">
            <i class="bi bi-envelope fs-5"></i>
            <input type="email" class="form-control border-0" placeholder="Enter your email" />
          </div>

          <div class="border-bottom border-secondary p-2 d-flex gap-2">
            <i class="bi bi-lock fs-5"></i>
            <input type="password" class="form-control border-0" placeholder="Create a password" />
          </div>

          <div class="border-bottom border-secondary p-2 d-flex gap-2">
            <i class="bi bi-lock fs-5"></i>
            <input type="password" class="form-control border-0" placeholder="Confirm a password" />
            <i class="bi bi-eye d-flex align-items-center fs-5"></i>
          </div>

          <div class="d-flex gap-2">
            <input type="checkbox" />
            <span>I accept all terms & conditons</span>
          </div>

          <button class="btn btn-primary">Register Now</button>
          <div class="d-flex justify-content-center gap-2">
            <span>Don't have an account?</span>
            <a href="#" class="text-decoration-none">Login now</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="	https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
