<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      rel="stylesheet"
      href="	https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
  </head>
  <body>
    <div class="d-flex align-items-center vh-100 bg-primary">
      <div
        class="row w-100 justify-content-center align-items-end text-secondary"
      >
        <!-- login -->
        <div
          class="col-4 bg-white text-black p-5 rounded-3 h-75 d-flex align-items-center"
        >
          <div class="w-100 d-flex flex-column gap-3">
            <h1><u class="link-underline-primary">Lo</u>gin</h1>

            <div class="border-bottom border-secondary p-2 d-flex gap-3 ">
              <i class="bi bi-envelope"></i>
              <input
                type="email"
                class="form-control border-0"
                placeholder="Enter your email"
              />
            </div>

            <div class="border-bottom border-secondary p-2 d-flex gap-3 ">
              <i class="bi bi-file-lock"></i> 
              <input
                type="password"
                class="form-control border-0"
                placeholder="Enter Your password"
              />
              <i class="bi bi-eye fs-6 "></i>
            </div>

          </div>
        </div>
      </div>
    </div>

    <!-- bootstrip content -->
    <script src="	https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
