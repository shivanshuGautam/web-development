<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Unorderd list</title>
  </head>
  <body>
    <h1>Disc bullest list:</h1>
    <ul types="Disc">
      <li>Apple</li>
      <li>Bananas</li>
      <li>Lemons</li>
      <li>Orange</li>
      <li>Jam</li>
    </ul>

    <h1>Circle bullest list:</h1>
    <ul type="Circle">
      <li>Apple</li>
      <li>Bananas</li>
      <li>Lemons</li>
      <li>Orange</li>
      <li>Jam</li>
    </ul>

    <h1>Square bullest list</h1>
    <ul type="Square">
      <li>Apple</li>
      <li>Bananas</li>
      <li>Lemons</li>
      <li>Orange</li>
      <li>Jam</li>
    </ul>
  </body>
</html>
