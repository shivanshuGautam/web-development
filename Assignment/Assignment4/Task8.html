<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <fieldset>
        <h1>Farewell Party Survey Form</h1>
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" placeholder="Enter your name">
        <br>
        <br>

         <label for="name">Email:</label>
        <input type="email" id="name" name="name" placeholder="Enter your email">
        <br>
        <br>

        <label for="name">Age:</label>
        <input type="number" id="name" name="name" placeholder="Enter your age">
        <br>
        <br>
       
        <label for="Student">Which option best describe you?</label>
        <select name="Student" id="Student">
            <option value="Student">Student</option>
             <option value="Student">Teacher</option>
              <option value="Student">Engineer</option>
      </select>
      <br><br>

      <label for="yoyo">Will you attent the party?</label>
      <input type="radio" name="yoyo" id="Yes" value="Yes">
      <label for="Yes">Yes</label>

      <input type="radio" name="yoyo" id="No" value="No">
      <label for="No">No</label>
      <br><br>

      <label for="program">What did you like about the program?</label>
      <br>
      <input type="checkbox" name="program" id="Training" value="Training">
      <label for="Training">Training</label>
      <br>

      <input type="checkbox" name="program" id="The Learning Session from industry Expert" value="The Learning Session from industry Expert">
      <label for="The Learning Session from industry Expert">The Learning Session from industry Expert</label>
      <br>

      <input type="checkbox" name="program" id="Community Meetups" value="Community Meetups">
      <label for="Community Meetups">Community Meetups</label>
      <br>

      <input type="checkbox" name="program" id="Brown Bag Sessions" value="Brown Bag Sessions">
      <label for="Brown Bag Sessions">Brown Bag Sessions</label>
      <br>

      <input type="checkbox" name="program" id="Switching to Hybrid Mode" value="Switching to Hybrid Mode">
      <label for="Switching to Hybrid Mode">Switching to Hybrid Mode</label>
      <br>

      <input type="checkbox" name="program" id="Food, Office etc" value="Food, Office etc">
      <label for="Food, Office etc">Food, Office etc</label>
      <br>

    <label for="Any comments or suggestions">Any comments or suggestions</label>
     <textarea name="Any comments or suggestions" id="Any comments or suggestions"></textarea>
   
  <button type="reset">Reset</button>
  <button type="submit">Submit</button>



    </fieldset>
</body>
</html>
