<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Application From</h1>
    <div>
        <label for="Name">First Name:</label>
        <input type="text" name="Name" id="Name">
         <label for="Name">Last Name:</label>
        <input type="text" name="Name" id="Name">
    </div>
    <br>
    <div>
        <label for="Birth">Date of birth:</label>
        <input type="date" name="Birth" id="Birth">
        <label for="Age">Age:</label>
        <input type="number" name="Age" id="Age">
    </div>
    <br>

    <div>

        <div>
            <section>
              <label for="Gender"> Gender :</label>
              <select id="Gender" name="Gender">
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Other">Other</option>
              </select>

              <label for="email">Email Address:</label>
              <input type="email" name="email" id="emai" placeholder="Enter email address" >
    </div>
    <br>

    <div>
        <label for="position">Position Available:</label>

        <input type="radio" name="position" id="Junior Developer" value="Junior Developer" >
        <label for="Junior Developer">Junior Developer</label>

        <input type="radio" name="position" id="Mid-level Developer" value="Mid-level Developer">
        <label for="Mid-level Developer">Mid-level Developer</label>

        <input type="radio" name="position" id="Senior Developer" value="Senior Developer">
        <label for="Senior Developer">Senior Developer</label>


    </div>

    <div>
        <label for="Language">Programing Language:</label>

        <input type="checkbox" name="Language" id="Java" value="Java">
        <label for="Java">Jva</label>

        <input type="checkbox" name="Language" id="JavaScript" value="JavaScript">
        <label for="JavaScript">JavaScript</label>

        <input type="checkbox" name="Language" id="Python" value="Python">
        <label for="Python">Python</label>
    </div>
    <br>

    <div>
        <label for="Name">Password:</label>
        <input type="number" name="Name" id="Name">
         <label for="Name">Confirm Password:</label>
        <input type="number" name="Name" id="Name">
    </div>
    <br>

    <div>
        <button type="submit">Submit</button>
        <button type="reset">Reset</button>
    </div>

</body>
</html>
