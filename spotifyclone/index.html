<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="icon" href="./image/logo.png" />
    <link rel="stylesheet" href="./css/style.css" />
    <title>spotyfy- web player:music for everyone</title>
  </head>
  <body>
    <div class="main">
      <div class="sidebar">
        <div class="nav">
          <div class="nav-option" style="opacity: 1">
            <i class="fa-solid fa-house"></i>
            <a href="">home</a>
          </div>
          <div class="nav-option">
            <i class="fa-solid fa-magnifying-glass"></i>
            <a href="">search</a>
          </div>
        </div>

        <div class="library">
          <div class="option">
            <div class="lib-option nav-option">
              <img src="./image/library_icon.png" alt="logo" />
              <a href="">your library</a>
            </div>

            <div class="icons">
              <i class="fa-solid fa-plus"></i>
              <i class="fa-solid fa-arrow-right"></i>
            </div>
          </div>
          <div class="lib-box">
            <div class="box">
              <p class="boxp1">Create your first playlist</p>
              <p class="boxp2">its easy , w'ell help you</p>
              <button class="badge">Create playlist</button>
            </div>
            <div class="box">
              <p class="boxp1">Let's find some podcast to follow</p>
              <p class="boxp2">We'll keepp you updated on new episodes</p>
              <button class="badge">Browse podcasts</button>
            </div>
          </div>
        </div>
      </div>
      <div class="maincontainer">
        <div class="sticky-nav"></div>
        <div class="card">
          <img src="./image/backward_icon.png" alt="backward_icon">
          <img src="./image/forward_icon.png" alt="forward_icon">
          <button>Explore premium</button>
          <button>install App</button>
        </div>
      </div>
      <div class="music">musicplayer</div>
    </div>
  </body>
</html>
