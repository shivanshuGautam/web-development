<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tip Calculator</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
  </head>

  <body>
    <div
      class="bg-primary vh-100 d-flex justify-content-center align-items-center"
    >
      <div class="w-100" style="max-width: 450px">
        <div
          class="bg-warning text-white text-center py-3 rounded-top-4 fw-bold mb-2"
        >
          TIP CALCULATOR
        </div>
        <!-- Heading -->

        <!-- Form -->
        <form id="tipForm" class="bg-white p-4 rounded-4 shadow">
          <!-- Bill Amount -->
          <label for="billAmount" class="form-label"> Bill Amount </label>

          <div class="input-group mb-4">
            <input
              type="text"
              id="billAmount"
              class="form-control border-0 border-bottom border-primary rounded-0 border-2"
              placeholder="Amount to be paid "
              pattern="[0-9]+"
              required
              oninput="this.value = this.value.replace(/[^0-9]/g, '')"
            />
            <span class="input-group-text border-0 bg-white">
              <i class="bi bi-currency-rupee"></i>
            </span>
          </div>

          <!-- Service -->
          <label for="service" class="form-label"> How was the service? </label>

          <select
            id="service"
            class="form-select mb-4 border-0 border-bottom border-primary rounded-0 border-2"
          >
            <option value="0.25">25% - Top Notch</option>
            <option value="0.20">20% - Excellent</option>
            <option value="0.15">15% - Good</option>
            <option value="0.10">10% - Bad</option>
            <option value="0.05">5% - Worst</option>
          </select>

          <!-- Number of Persons -->
          <label for="persons" class="form-label">
            Total number of persons
          </label>

          <input
            type="text"
            id="persons"
            class="form-control mb-4 border-0 border-bottom border-primary rounded-0 border-2"
            placeholder="Number of persons sharing the bill"
            pattern="[0-9]+"
            required
            oninput="this.value = this.value.replace(/[^0-9]/g, '')"
          />

          <!-- Button -->
          <div class="d-grid">
            <button
              type="submit"
              class="btn btn-info text-white w-50 py-2 fs-5 fw-bold"
            >
              Calculate
            </button>
          </div>

          <!-- Result -->
          <div class="text-center mt-4">
            <h5>Tip Amount</h5>

            <h3>
                <span id="tipResult">0</span>
                <i class="bi bi-currency-rupee"></i>
            </h3>

            <p class="text-muted">each person</p>
          </div>
        </form>
      </div>
    </div>

    <script src="script.js"></script>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
