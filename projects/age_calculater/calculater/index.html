<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculater</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="big">
      <img src="./image.png" alt="" class="vh-100 vw-100" />

      <div class="position-absolute top-50 start-50 translate-middle gap-3">
        <div class=" mb-3 ">
          <input type="text" pattern="[0-9]" class="input" />
        </div>
        <div class="btnall d-grid gap-3">
          <button class="bg-white rounded-5 p-3 border p-3 border-0">AC</button>
          <button class="bg-white rounded-5 p-3 border p-3 border-0">C</button>
          <button class="bg-white rounded-5 p-3 border p-3 border-0">%</button>
          <button class="bg-white rounded-5 p-3 border p-3 border-0">/</button>

          <button class="bg-white rounded-5 p-3 border p-3 border-0">7</button>
          <button class="bg-white rounded-5 p-3 border p-3 border-0">8</button>
          <button class="bg-white rounded-5 p-3 border p-3 border-0">9</button>
          <button class="bg-white rounded-5 p-3 border p-3 border-0">*</button>

          <button class="bg-white rounded-5 p-3 border p-3 border-0">4</button>
          <button class="bg-white rounded-5 p-3 border p-3 border-0">5</button>
          <button class="bg-white rounded-5 p-3 border p-3 border-0">6</button>
          <button class="bg-white rounded-5 p-3 border p-3 border-0">-</button>

          <button class="bg-white rounded-5 p-3 border p-3 border-0">1</button>
          <button class="bg-white rounded-5 p-3 border p-3 border-0">2</button>
          <button class="bg-white rounded-5 p-3 border p-3 border-0">3</button>
          <button class="bg-white rounded-5 p-3 border p-3 border-0">+</button>

          <button class="bg-white rounded-5 p-3 border p-3 border-0">0</button>
          <button class="bg-white rounded-5 p-3 border p-3 border-0">.</button>
          <span class="bg-white rounded-5 p-3 border p-3 border-0">=</span>
        </div>
      </div>
    </div>

    <!-- script -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src=""></script>
  </body>
</html>
