<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Salary Calculator</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-md-6">
          <div class="card shadow">
            <div class="card-header text-center bg-success text-white">
              <h3>Salary Calculator</h3>
            </div>

            <div class="card-body">
              <!-- Success Message -->
              <div id="successMessage" class="alert alert-success d-none">
                Salary calculated successfully!
              </div>

              <!-- Salary Input -->
              <div class="mb-3">
                <label class="form-label">Basic Salary</label>

                <input
                  type="number"
                  id="basicSalary"
                  class="form-control"
                  placeholder="Enter Basic Salary"
                />

                <small id="errorMessage" class="text-danger"></small>
              </div>

              <!-- Buttons -->
              <div class="d-flex gap-2">
                <button id="calculateBtn" class="btn btn-success text-white">
                  <span id="btnText">Calculate Gross Salary</span>

                  <span
                    id="spinner"
                    class="spinner-border spinner-border-sm d-none"
                  ></span>
                </button>

                <button id="resetBtn" class="btn btn-secondary">Reset</button>
              </div>

              <!-- Result -->
              <div id="resultCard" class="card mt-4 d-none">
                <div class="card-body">
                  <p>
                    <strong>Basic Salary:</strong>
                    <span id="resultBasic"></span>
                  </p>

                  <p><strong>HRA:</strong> <span id="resultHra"></span></p>

                  <p><strong>DA:</strong> <span id="resultDa"></span></p>

                  <hr />

                  <h5>
                    <strong>Gross Salary:</strong>
                    <span id="resultGross"></span>
                  </h5>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
