<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Electricity Bill Calculator</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div
      class="container min-vh-100 d-flex justify-content-center align-items-center"
    >
      <div class="bill-card">
        <h2 class="text-center text-white mb-4">Electricity Bill Calculator</h2>

        <!-- Input -->
        <div class="input-group mb-4">
          <span class="input-group-text">
            <i class="bi bi-lightning-charge-fill text-warning"></i>
          </span>

          <input
            type="number"
            min="0"
            id="Units"
            class="form-control"
            placeholder="Enter Electricity Units"
          />
        </div>

        <!-- Buttons -->
        <div class="d-grid gap-3">
          <button class="btn btn-success" id="submit">Calculate Bill</button>

          <button class="btn btn-danger" id="reset">Clear</button>
        </div>

        <!-- Result Card -->
        <div id="result" class="card mt-4 p-3 d-none">
          <h4 class="text-center text-primary mb-3">Bill Details</h4>

          <p id="slab1"></p>
          <p id="slab2"></p>
          <p id="slab3"></p>
          <p id="slab4"></p>

          <hr />

          <p id="subtotal" class="fw-bold"></p>

          <p id="surcharge" class="fw-bold text-danger"></p>

          <h4 id="grandTotal" class="text-success fw-bold"></h4>
        </div>
      </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Custom JS -->
    <script src="script.js"></script>
  </body>
</html>
